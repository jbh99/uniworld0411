/*══════════════════════════════════════════════
  UNI-WORLD SERVICES — REDESIGNED
  Modern Premium Global Business Design
══════════════════════════════════════════════*/

/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:'Inter','Noto Sans KR','Noto Sans SC','Noto Sans JP',system-ui,sans-serif;color:#1e293b;background:#fff;line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit;transition:all .25s}
ul{list-style:none}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none}

/* ── VARIABLES ── */
:root{
  --navy:#0c2340;
  --navy-light:#163a5f;
  --blue:#1a6fb5;
  --blue-light:#2d8fd5;
  --gold:#c8a45a;
  --gold-light:#dbb96e;
  --dark:#0a1628;
  --text:#1e293b;
  --text-2:#475569;
  --text-3:#94a3b8;
  --bg:#f8fafc;
  --bg-2:#f0f6ff;
  --bg-3:#e2eefc;
  --border:#e2e8f0;
  --shadow-xs:0 1px 2px rgba(0,0,0,.05);
  --shadow-sm:0 2px 8px rgba(0,0,0,.06);
  --shadow-md:0 8px 30px rgba(0,0,0,.09);
  --shadow-lg:0 20px 60px rgba(0,0,0,.12);
  --shadow-xl:0 25px 80px rgba(0,0,0,.16);
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:24px;
  --ease:cubic-bezier(.4,0,.2,1);
  --max-w:1240px;
}

/* ── LAYOUT UTILS ── */
.container{max-width:var(--max-w);margin:0 auto;padding:0 40px}
.section{padding:100px 0}
@media(max-width:768px){.section{padding:60px 0}.container{padding:0 20px}}

/* ── TYPOGRAPHY ── */
.label{display:inline-flex;align-items:center;gap:8px;font-size:.72rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.label::before{content:'';width:28px;height:2px;background:var(--gold)}
.heading-xl{font-size:clamp(2.6rem,5.5vw,4.2rem);font-weight:900;line-height:1.1;letter-spacing:-.03em}
.heading-lg{font-size:clamp(1.9rem,4vw,2.9rem);font-weight:800;line-height:1.18;letter-spacing:-.02em}
.heading-md{font-size:clamp(1.2rem,2.5vw,1.6rem);font-weight:700;line-height:1.3}
.text-lg{font-size:1.05rem;color:var(--text-2);line-height:1.85;max-width:640px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:50px;font-weight:700;font-size:.92rem;transition:all .3s var(--ease);letter-spacing:.3px;position:relative;overflow:hidden}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-light);transform:translateY(-2px);box-shadow:0 10px 28px rgba(12,35,64,.3)}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--navy)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(200,164,90,.45)}
.btn-outline{border:2px solid var(--border);color:var(--text);background:transparent}
.btn-outline:hover{border-color:var(--navy);color:var(--navy)}
.btn-white{background:#fff;color:var(--navy)}
.btn-white:hover{background:rgba(255,255,255,.92);transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.18)}
.btn-ghost{border:2px solid rgba(255,255,255,.75);color:#fff;background:rgba(0,10,30,.35);backdrop-filter:blur(8px)}
.btn-ghost:hover{border-color:#fff;background:rgba(255,255,255,.1)}
.btn svg,.btn .arrow{transition:transform .3s var(--ease)}
.btn:hover .arrow{transform:translateX(4px)}

/* ── TOP BAR ── */
.topbar{background:var(--dark);color:rgba(255,255,255,.6);font-size:.78rem;padding:9px 0}
.topbar .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.topbar-left{display:flex;align-items:center;gap:6px}
.topbar-left .gold-badge{color:var(--gold);font-weight:700}
.topbar-right{display:flex;align-items:center;gap:20px}
.topbar a{color:rgba(255,255,255,.7);transition:color .2s}
.topbar a:hover{color:var(--gold)}
.lang-switcher{position:relative}
.lang-btn{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,.8);font-size:.78rem;font-weight:600;cursor:pointer;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1)}
.lang-btn:hover{background:rgba(255,255,255,.14)}
.lang-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-lg);min-width:180px;z-index:9999;display:none;overflow:hidden}
.lang-dropdown.open{display:block}
.lang-dropdown a{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:.85rem;color:var(--text);font-weight:500}
.lang-dropdown a:hover{background:var(--bg-2);color:var(--navy)}
.lang-dropdown a.active{background:var(--bg-3);color:var(--navy);font-weight:700}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.97);backdrop-filter:blur(20px) saturate(1.3);border-bottom:1px solid transparent;transition:all .3s var(--ease)}
.header.scrolled{border-color:var(--border);box-shadow:0 2px 20px rgba(0,0,0,.06)}
.header .container{display:flex;align-items:center;justify-content:space-between;height:90px}
.logo{display:flex;align-items:center;gap:12px;padding:4px 0}
.logo-mark{width:40px;height:40px;background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.logo-mark::after{content:'';position:absolute;top:0;right:0;width:50%;height:50%;background:linear-gradient(135deg,transparent 50%,rgba(200,164,90,.35));border-radius:0 10px 0 0}
.logo-mark span{color:#fff;font-weight:900;font-size:.95rem;letter-spacing:-.5px;position:relative;z-index:2}
.logo-text{font-weight:800;font-size:1.1rem;color:var(--navy);line-height:1.2}
.logo-text small{display:block;font-size:.6rem;font-weight:500;color:var(--text-3);letter-spacing:1.5px;text-transform:uppercase}
.nav{display:flex;align-items:center;gap:2px}
.nav a{padding:8px 14px;font-size:.86rem;font-weight:600;color:var(--text-2);border-radius:var(--r-sm);transition:all .2s}
.nav a:hover,.nav a.active{color:var(--navy);background:var(--bg-2)}
.nav a.active{font-weight:700}
.nav-cta{margin-left:8px;padding:10px 22px !important;background:linear-gradient(135deg,var(--navy),var(--navy-light)) !important;color:#fff !important;border-radius:50px !important;font-weight:700 !important}
.nav-cta:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(12,35,64,.3) !important}

/* Mobile Nav */
.mobile-toggle{display:none;flex-direction:column;gap:5px;padding:8px;cursor:pointer}
.mobile-toggle span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.mobile-nav{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.98);backdrop-filter:blur(20px);z-index:9998;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.mobile-nav.open{display:flex}
.mobile-nav a{font-size:1.2rem;font-weight:700;padding:12px 32px;color:var(--text);border-radius:var(--r-md)}
.mobile-nav a:hover{background:var(--bg-2);color:var(--navy)}
.mobile-close{position:absolute;top:24px;right:24px;font-size:1.8rem;color:var(--text);padding:8px}

.hero-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(5,10,25,.55) 0%,rgba(5,10,25,.45) 60%,rgba(5,10,25,.6) 100%)}
.hero-geo{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.hero-geo::before{content:'';position:absolute;top:-20%;right:-10%;width:700px;height:700px;background:radial-gradient(circle,rgba(200,164,90,.08) 0%,transparent 60%);border-radius:50%}
.hero-geo::after{content:'';position:absolute;bottom:-30%;left:-5%;width:500px;height:500px;background:radial-gradient(circle,rgba(26,111,181,.12) 0%,transparent 60%);border-radius:50%}
.hero .container{position:relative;z-index:3;text-align:center;padding-top:40px;padding-bottom:40px}
.hero-content{color:#fff;max-width:860px;margin:0 auto;text-shadow:0 1px 10px rgba(0,0,0,.6)}
.hero-badges{display:flex;justify-content:center;gap:10px;margin-bottom:32px;flex-wrap:wrap}
.hero-badge{display:inline-flex;align-items:center;gap:7px;padding:7px 16px;background:rgba(0,10,30,.5);border:1px solid rgba(77,168,255,.3);border-radius:50px;font-size:.77rem;font-weight:600;backdrop-filter:blur(10px);letter-spacing:.3px;color:rgba(255,255,255,.95)}
.hero-badge .dot{width:7px;height:7px;border-radius:50%;background:#4ade80;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.hero-badge .gold{color:var(--gold)}
.hero h1{margin-bottom:8px;text-shadow:0 2px 25px rgba(0,0,0,.8),0 0 40px rgba(0,0,0,.5)}
.hero h1 .gold-text{color:#4da8ff;-webkit-text-fill-color:#4da8ff;text-shadow:0 0 30px rgba(77,168,255,.6),0 2px 20px rgba(0,0,0,.8)}
.hero-divider{width:60px;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;margin:20px auto}
.hero .subtitle{font-size:1.1rem;color:rgba(255,255,255,.92);line-height:1.9;margin:0 auto 40px;max-width:580px}
.hero-buttons{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:56px}

/* Hero stats strip */
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:720px;margin:0 auto}
.stat-box{background:rgba(0,10,30,.45);backdrop-filter:blur(16px);border:1px solid rgba(77,168,255,.25);border-radius:var(--r-lg);padding:18px 12px;text-align:center;transition:all .3s var(--ease)}
.stat-box:hover{background:rgba(255,255,255,.12);transform:translateY(-3px)}
.stat-box .num{font-size:1.7rem;font-weight:900;color:#4da8ff;margin-bottom:2px;line-height:1;text-shadow:0 0 15px rgba(77,168,255,.5)}
.stat-box .num span{color:var(--gold)}
.stat-box .txt{font-size:.7rem;color:rgba(255,255,255,.88);letter-spacing:.5px}

/* Hero trust bar */
.hero-trust-bar{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-top:24px;padding:18px 24px;background:rgba(0,10,30,.45);border:1px solid rgba(77,168,255,.2);border-radius:var(--r-lg);max-width:680px;margin-left:auto;margin-right:auto}
.hero-trust-item{display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.95);font-size:.83rem}
.hero-trust-item .ck{color:var(--gold);font-size:.85rem}

/* ── CREDENTIALS BAR ── */
.cred-bar{background:var(--bg-2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:22px 0}
.cred-bar .container{display:flex;align-items:center;justify-content:center;gap:36px;flex-wrap:wrap}
.cred-item{display:flex;align-items:center;gap:10px;color:var(--text-2);font-size:.83rem;font-weight:600;white-space:nowrap}
.cred-item .cred-icon{width:34px;height:34px;border-radius:8px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1rem;box-shadow:var(--shadow-xs)}

/* ── SERVICES ── */
.services{background:var(--bg)}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.service-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-xl);padding:36px 28px;transition:all .35s var(--ease);position:relative;overflow:hidden;cursor:pointer}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--navy),var(--blue));transform:scaleX(0);transform-origin:left;transition:transform .4s var(--ease)}
.service-card::after{content:'';position:absolute;bottom:0;right:0;width:120px;height:120px;background:radial-gradient(circle,rgba(26,111,181,.04),transparent);border-radius:50%;transition:all .4s}
.service-card:hover::before{transform:scaleX(1)}
.service-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-6px);border-color:transparent}
.service-card:hover::after{width:200px;height:200px}
.svc-icon{width:58px;height:58px;background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:20px;color:#fff;transition:all .3s;box-shadow:0 4px 16px rgba(12,35,64,.2)}
.service-card:hover .svc-icon{transform:scale(1.08) rotate(3deg);box-shadow:0 8px 24px rgba(26,111,181,.3)}
.service-card h3{font-size:1.05rem;font-weight:700;margin-bottom:8px;color:var(--text)}
.service-card p{font-size:.86rem;color:var(--text-2);line-height:1.75;margin-bottom:16px}
.svc-tags{display:flex;flex-wrap:wrap;gap:6px}
.svc-tag{padding:4px 10px;background:var(--bg-2);border-radius:6px;font-size:.7rem;font-weight:700;color:var(--navy);letter-spacing:.3px}
.svc-link{display:inline-flex;align-items:center;gap:5px;font-size:.84rem;font-weight:700;color:var(--blue);margin-top:12px;transition:all .2s}
.svc-link:hover{gap:9px;color:var(--navy)}

.about-section>.container{position:relative;z-index:1}

.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:64px;position:relative}
.steps::before{content:'';position:absolute;top:36px;left:12%;width:76%;height:1px;background:linear-gradient(90deg,transparent,rgba(200,164,90,.3),rgba(200,164,90,.3),transparent)}
.step{text-align:center;position:relative}
.step-num{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:var(--navy);margin:0 auto 24px;position:relative;z-index:2;box-shadow:0 0 0 4px rgba(200,164,90,.15),0 8px 24px rgba(200,164,90,.25);transition:all .3s}
.step:hover .step-num{transform:scale(1.12);box-shadow:0 0 0 8px rgba(200,164,90,.15),0 12px 32px rgba(200,164,90,.4)}
.step h3{font-size:1rem;font-weight:700;margin-bottom:8px;color:#fff}
.step p{font-size:.84rem;color:rgba(255,255,255,.48);line-height:1.75;max-width:220px;margin:0 auto}

/* ── LEADERSHIP ── */
.leadership{background:linear-gradient(160deg,#edf5fb 0%,#daeaf7 100%);scroll-margin-top:96px;position:relative;z-index:1}
.lead-grid{display:grid;grid-template-columns:1fr 1.35fr;gap:64px;align-items:center;margin-top:48px}
.lead-photo-wrap{text-align:center}
.lead-photo-ring{width:280px;height:280px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-light));padding:5px;margin:0 auto 24px;box-shadow:0 0 0 8px rgba(200,164,90,.12),var(--shadow-xl)}
.lead-photo-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:var(--bg-2)}
.lead-photo-inner img{width:100%;height:100%;object-fit:cover;object-position:center 15%}
.lead-name{font-size:1.65rem;font-weight:900;margin-bottom:4px;color:var(--navy)}
.lead-role{color:var(--gold);font-size:.92rem;font-weight:700;letter-spacing:.5px}
.lead-info h2{margin-bottom:20px;color:var(--navy)}
.lead-info p{color:#2c5070;line-height:1.9;margin-bottom:14px;font-size:.94rem}
.positions-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px}
.position-card{background:rgba(255,255,255,.6);border:1px solid rgba(12,35,64,.1);border-radius:var(--r-md);padding:16px;display:flex;align-items:flex-start;gap:10px;transition:all .3s;backdrop-filter:blur(4px)}
.position-card:hover{background:rgba(255,255,255,.9);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.position-card .pos-icon{width:38px;height:38px;min-width:38px;border-radius:10px;background:rgba(200,164,90,.12);display:flex;align-items:center;justify-content:center;font-size:1rem}
.position-card h4{font-size:.83rem;font-weight:700;margin-bottom:2px;color:var(--navy)}
.position-card p{font-size:.74rem;color:#4a7090}

/* ── TRUST / NUMBERS ── */
.trust{background:var(--bg)}
.trust-nums{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:48px}
.trust-num{text-align:center;padding:40px 20px;background:#fff;border-radius:var(--r-xl);border:1px solid var(--border);transition:all .3s}
.trust-num:hover{box-shadow:var(--shadow-md);transform:translateY(-4px)}
.trust-num .big{font-size:3.2rem;font-weight:900;color:var(--navy);line-height:1}
.trust-num .big span{color:var(--gold)}
.trust-num .lbl{color:var(--text-2);font-size:.88rem;margin-top:8px;font-weight:600}

/* Testimonials */
.testimonials{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.testi{background:#fff;border:1px solid var(--border);border-radius:var(--r-xl);padding:32px 28px;position:relative;transition:all .3s;overflow:hidden}
.testi::before{content:'\201C';position:absolute;top:12px;left:20px;font-size:4rem;color:var(--gold);opacity:.18;font-family:Georgia,serif;line-height:1}
.testi:hover{box-shadow:var(--shadow-md);transform:translateY(-3px)}
.testi .stars{color:var(--gold);font-size:.88rem;margin-bottom:12px;letter-spacing:2px}
.testi p{font-size:.88rem;color:var(--text-2);line-height:1.8;margin-bottom:16px;position:relative;z-index:2}
.testi-author{display:flex;align-items:center;gap:12px}
.testi-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.85rem}
.testi-name{font-weight:700;font-size:.86rem;color:var(--navy)}
.testi-role{font-size:.76rem;color:var(--text-3)}

/* ── INNOVATION ── */
.innovation{background:#fff;border-top:1px solid var(--border)}
.inno-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:48px}
.inno-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-xl);padding:36px 28px;text-align:center;transition:all .35s var(--ease);position:relative;overflow:hidden}
.inno-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(12,35,64,0),rgba(12,35,64,.03));opacity:0;transition:opacity .3s}
.inno-card:hover{box-shadow:var(--shadow-md);transform:translateY(-5px);border-color:rgba(200,164,90,.4)}
.inno-card:hover::before{opacity:1}
.inno-icon{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,rgba(200,164,90,.1),rgba(200,164,90,.05));display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin:0 auto 22px;transition:all .35s;box-shadow:0 4px 16px rgba(200,164,90,.1)}
.inno-card:hover .inno-icon{background:linear-gradient(135deg,var(--gold),var(--gold-light));box-shadow:0 8px 24px rgba(200,164,90,.35)}
.inno-card h3{font-size:1.05rem;font-weight:700;margin-bottom:8px;color:var(--navy)}
.inno-card p{font-size:.86rem;color:var(--text-2);line-height:1.75}

/* ── CTA ── */
.cta{background:linear-gradient(135deg,var(--navy),#1a4a7a,var(--blue));padding:88px 0;text-align:center;color:#fff;position:relative;overflow:hidden}
.cta::before{content:'';position:absolute;top:-50%;right:-15%;width:600px;height:600px;background:radial-gradient(circle,rgba(200,164,90,.1),transparent 65%);border-radius:50%}
.cta::after{content:'';position:absolute;bottom:-40%;left:-10%;width:400px;height:400px;background:radial-gradient(circle,rgba(255,255,255,.04),transparent 65%);border-radius:50%}
.cta h2{position:relative;z-index:2;color:#fff;margin-bottom:12px}
.cta p{position:relative;z-index:2;margin-bottom:40px}
.cta-buttons{position:relative;z-index:2;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}

/* ── CONTACT ── */
.contact-grid{display:grid;grid-template-columns:1fr 1.2fr;gap:48px;margin-top:48px}
.contact-info-cards{display:flex;flex-direction:column;gap:14px}
.ci-card{display:flex;gap:16px;padding:22px 24px;background:#fff;border-radius:var(--r-lg);border:1px solid var(--border);transition:all .25s}
.ci-card:hover{box-shadow:var(--shadow-sm);transform:translateX(3px)}
.ci-icon{width:46px;height:46px;min-width:46px;border-radius:12px;background:linear-gradient(135deg,var(--navy),var(--blue));display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:#fff}
.ci-card h4{font-size:.88rem;font-weight:700;margin-bottom:4px;color:var(--navy)}
.ci-card p{font-size:.83rem;color:var(--text-2);line-height:1.6}
.contact-form{background:#fff;border:1px solid var(--border);border-radius:var(--r-xl);padding:36px 32px;box-shadow:var(--shadow-sm)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.83rem;font-weight:600;margin-bottom:6px;color:var(--navy)}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 15px;border:1.5px solid var(--border);border-radius:var(--r-md);font-size:.88rem;color:var(--text);background:#fafcff;transition:all .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,111,181,.08);background:#fff}
.form-group textarea{min-height:110px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ── FOOTER ── */
.footer{background:var(--dark);color:rgba(255,255,255,.55);padding:72px 0 36px}
.footer-grid{display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr;gap:48px;margin-bottom:52px}
.footer-brand .logo{margin-bottom:16px}
.footer-brand .logo-text{color:#fff}
.footer-brand .logo-text small{color:rgba(255,255,255,.3)}
.footer-brand p{font-size:.86rem;line-height:1.75;margin-bottom:20px;max-width:280px}
.footer-social{display:flex;gap:8px}
.footer-social a{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:.88rem;transition:all .25s}
.footer-social a:hover{background:var(--gold);color:var(--navy);transform:translateY(-2px)}
.footer-col h4{color:#fff;font-size:.85rem;font-weight:700;margin-bottom:16px;letter-spacing:.5px}
.footer-col a{display:block;font-size:.83rem;padding:5px 0;transition:color .2s;line-height:1.6}
.footer-col a:hover{color:var(--gold)}
.footer-bottom{border-top:1px solid rgba(255,255,255,.06);padding-top:24px;display:flex;justify-content:space-between;align-items:center;font-size:.78rem;flex-wrap:wrap;gap:12px}
.footer-bottom a{margin-left:20px;transition:color .2s}
.footer-bottom a:hover{color:var(--gold)}

/* ── FLOATING ── */
.floating{position:fixed;bottom:28px;right:28px;z-index:999;display:flex;flex-direction:column;gap:10px}
.float-btn{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:var(--shadow-md);transition:all .3s;border:none;cursor:pointer}
.float-btn:hover{transform:scale(1.12) translateY(-2px);box-shadow:var(--shadow-lg)}
.fl-kakao{background:#fee500;color:#391b1b}
.fl-wechat{background:#07c160;color:#fff}
.fl-phone{background:var(--navy);color:#fff}
.fl-top{background:#fff;color:var(--text);border:1px solid var(--border)}

/* ── VIDEO EMBED ── */
.video-wrap{position:relative;width:100%;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-lg);aspect-ratio:16/9;background:#000}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0}
.video-caption{text-align:center;margin-top:12px;font-size:.82rem;color:rgba(255,255,255,.5)}

/* ── TEAM SLIDER ── */
.team-slider{position:relative;overflow:hidden;border-radius:var(--r-xl);background:var(--bg-3);border:1px solid var(--border);max-height:360px}
.team-track{display:flex;transition:transform .6s var(--ease)}
.team-slide{min-width:100%;height:300px;display:flex;align-items:center;justify-content:center;background:var(--bg-3);position:relative;flex-shrink:0}
.team-slide .placeholder{color:var(--text-3);font-size:.85rem;text-align:center;line-height:1.6;padding:20px}
.team-nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.9);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;z-index:5;transition:all .2s;box-shadow:var(--shadow-sm)}
.team-nav:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.team-nav.prev{left:12px}
.team-nav.next{right:12px}
.team-controls{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px;padding:12px 0}
.team-dots{display:flex;justify-content:center;gap:8px}
.team-dot{width:10px;height:10px;border-radius:50%;background:var(--border);cursor:pointer;transition:all .2s}
.team-dot.active{background:var(--navy);width:28px;border-radius:5px}
.team-ctrl-btn{width:36px;height:36px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;transition:all .2s}
.team-ctrl-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ── AWARDS ── */
.awards{background:var(--bg);border-top:1px solid var(--border)}
.awards-8-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:40px}
.award-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;flex-shrink:0;transition:all .3s}
.award-card:hover{box-shadow:var(--shadow-md);transform:translateY(-4px)}
.award-img{width:100%;background:var(--bg-3);display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:.8rem;text-align:center;position:relative;overflow:hidden}
.award-body{padding:14px 18px}
.award-body h4{font-size:.88rem;font-weight:700;margin-bottom:4px;color:var(--navy)}
.award-body p{font-size:.76rem;color:var(--text-3)}

/* ── LOGO SLIDER ── */
.logo-slider{overflow:hidden;padding:32px 0;position:relative;background:#fff;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.logo-slider::before,.logo-slider::after{content:'';position:absolute;top:0;width:100px;height:100%;z-index:2;pointer-events:none}
.logo-slider::before{left:0;background:linear-gradient(90deg,#fff,transparent)}
.logo-slider::after{right:0;background:linear-gradient(-90deg,#fff,transparent)}
.logo-track{display:flex;gap:40px;animation:logoScroll 28s linear infinite;width:max-content}
.logo-track:hover{animation-play-state:paused}
@keyframes logoScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.logo-item{display:flex;align-items:center;justify-content:center;min-width:140px;height:60px;background:#fff;border:1px solid var(--border);border-radius:var(--r-md);padding:10px 18px;transition:all .25s;cursor:pointer;flex-shrink:0}
.logo-item img{max-height:36px;max-width:110px;width:auto;object-fit:contain;filter:grayscale(30%);transition:all .3s;display:block}
.logo-item:hover img{filter:none}
.logo-item:hover{border-color:var(--navy);box-shadow:var(--shadow-sm);transform:translateY(-2px)}

/* ── PARTNERS PAGE ── */
.partners-hero{background:linear-gradient(160deg,var(--dark),var(--navy));padding:80px 0;text-align:center;color:#fff}
.partner-cats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:40px 0 32px}
.pcat-btn{padding:8px 20px;border-radius:50px;font-size:.81rem;font-weight:700;background:var(--bg-2);color:var(--text-2);border:1px solid var(--border);cursor:pointer;transition:all .25s}
.pcat-btn.active,.pcat-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.partners-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:24px}
.partner-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:28px 20px;text-align:center;transition:all .3s;cursor:pointer}
.partner-card:hover{box-shadow:var(--shadow-md);transform:translateY(-4px);border-color:rgba(26,111,181,.3)}
.partner-logo{width:60px;height:60px;border-radius:14px;background:var(--bg-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:1.5rem;transition:all .3s}
.partner-card:hover .partner-logo{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border-color:transparent}
.partner-card h4{font-size:.88rem;font-weight:700;margin-bottom:4px;color:var(--navy)}
.partner-card p{font-size:.76rem;color:var(--text-3);line-height:1.5;margin-bottom:10px}
.partner-link{font-size:.76rem;font-weight:700;color:var(--blue);display:inline-flex;align-items:center;gap:4px}
.partner-link:hover{color:var(--navy)}

/* ── ABOUT MEDIA GRID ── */
.about-media-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:32px}
.about-portrait-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.about-portrait-img{width:100%;border-radius:var(--r-lg);object-fit:cover;height:220px}

/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(28px);transition:all .7s var(--ease)}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ── PAGE TRANSITION ── */
.page{animation:pageIn .4s var(--ease)}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── SECTION DIVIDER ── */
.section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:0}

/* ── RESPONSIVE ── */
@media(max-width:1024px){
  .hero .container{text-align:center}
  .services-grid{grid-template-columns:repeat(2,1fr)}
  .about-grid{grid-template-columns:1fr}
  .about-img-stack{height:320px;margin-bottom:20px}
  .lead-grid{grid-template-columns:1fr}
  .lead-photo-wrap{order:-1}
  .footer-grid{grid-template-columns:1fr 1fr}
  .contact-grid{grid-template-columns:1fr}
  .partners-grid{grid-template-columns:repeat(2,1fr)}
  .awards-8-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:768px){
  .nav{display:none}
  .header-qr{display:none}
  .mobile-toggle{display:flex}
  .services-grid{grid-template-columns:1fr}
  .steps{grid-template-columns:repeat(2,1fr)}
  .steps::before{display:none}
  .trust-nums{grid-template-columns:repeat(2,1fr)}
  .testimonials{grid-template-columns:1fr}
  .inno-grid{grid-template-columns:1fr}
  .stats-strip{grid-template-columns:repeat(2,1fr)}
  .positions-grid{grid-template-columns:1fr}
  .footer-grid{grid-template-columns:1fr;gap:28px}
  .form-row{grid-template-columns:1fr}
  .about-media-grid{grid-template-columns:1fr}
  .hero-trust-bar{gap:16px}
  .cred-bar .container{gap:16px}
}
@media(max-width:480px){
  .awards-8-grid{grid-template-columns:1fr}
  .about-img-accent{width:140px;height:130px}
}

// ── STATE ──
let lang = localStorage.getItem('uw_lang') || 'ko';
let currentPage = 'home';
let langOpen = false;

function t(key){ return T[lang][key] || T.en[key] || key; }
function nl2br(s){ return (s||'').replace(/\n/g,'<br>'); }

// ── ROUTER ──
function navigate(page, e){
  if(e) e.preventDefault();
  currentPage = page;
  window.location.hash = '#/' + (page === 'home' ? '' : page);
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function parseHash(){
  const h = window.location.hash.replace('#/','');
  return h || 'home';
}

window.addEventListener('hashchange', ()=>{
  currentPage = parseHash();
  render();
});

// ── LANGUAGE ──
function setLang(l){
  lang = l;
  localStorage.setItem('uw_lang', l);
  langOpen = false;
  render();
}
function toggleLang(){ langOpen = !langOpen; render(); }

// ── RENDER ──
function render(){
  const app = document.getElementById('app');
  app.innerHTML = renderTopbar() + renderHeader() + renderPage() + renderFooter() + renderFloating();
  initEvents();
  initScrollReveal();
}

function renderTopbar(){
  return `<div class="topbar"><div class="container"><div class="topbar-right"><a href="mailto:${t('topbar_email')}">✉ ${t('topbar_email')}</a><a href="tel:${t('topbar_phone')}">☎ ${t('topbar_phone')}</a><div class="lang-switcher"><button class="lang-btn" onclick="toggleLang()">${T[lang]._flag} ${T[lang]._name} ▾</button><div class="lang-dropdown ${langOpen?'open':''}">${Object.keys(T).map(k=>`<a href="#" class="${k===lang?'active':''}" onclick="event.preventDefault();setLang('${k}')">${T[k]._flag} ${T[k]._name}</a>`).join('')}</div></div></div></div></div>`;
}

function renderHeader(){

let teamIdx = 0;
function slideTeam(dir){
  const track=document.getElementById('teamTrack');
  if(!track)return;
  const total=track.children.length;
  teamIdx=(teamIdx+dir+total)%total;
  track.style.transform=`translateX(-${teamIdx*100}%)`;
  document.querySelectorAll('#teamDots div').forEach((d,i)=>{d.style.background=i===teamIdx?'#0c2340':'#cbd5e1';});
}
function slideTeamTo(i){
  teamIdx=i;
  const track=document.getElementById('teamTrack');
  if(track){track.style.transform=`translateX(-${i*100}%)`;document.querySelectorAll('#teamDots div').forEach((d,j)=>{d.style.background=j===i?'#0c2340':'#cbd5e1';});}
}
// Auto-slide team photos
setInterval(()=>{if(document.getElementById('teamTrack'))slideTeam(1);},4000);

// ── COMMUNITY LEADERSHIP SLIDER ──
let communityIdx = 0;
function slideCommunity(dir){
  const track = document.getElementById('communityTrack');
  if(!track) return;
  const total = track.children.length;
  communityIdx = (communityIdx + dir + total) % total;
  track.style.transform = `translateX(-${communityIdx * 100}%)`;
  updateCommunityDots();
}
function slideCommunityTo(i){
  communityIdx = i;
  const track = document.getElementById('communityTrack');
  if(track) track.style.transform = `translateX(-${i * 100}%)`;
  updateCommunityDots();
}
function updateCommunityDots(){
  for(let i=0;i<5;i++){
    const d = document.getElementById('cdot'+i);
    if(!d) continue;
    d.style.width = i === communityIdx ? '28px' : '10px';
    d.style.borderRadius = i === communityIdx ? '5px' : '50%';
    d.style.background = i === communityIdx ? 'rgba(200,164,90,1)' : 'rgba(200,164,90,.35)';
  }
}
setInterval(()=>{if(document.getElementById('communityTrack'))slideCommunity(1);},5000);

let awardIdx=0;
function slideAwards(dir){
  const track=document.getElementById('awardsTrack');
  if(!track)return;
  const cards=track.children;
  const cardW=cards[0]?.offsetWidth+20||300;
  const maxIdx=Math.max(0,cards.length-Math.floor(track.parentElement.offsetWidth/cardW));
  awardIdx=Math.max(0,Math.min(maxIdx,awardIdx+dir));
  track.style.transform=`translateX(-${awardIdx*cardW}px)`;
  document.querySelectorAll('.slider-dot').forEach((d,i)=>d.classList.toggle('active',i===awardIdx));
}
function slideAwardsTo(i){awardIdx=i-1;slideAwards(1);}

function initEvents(){
  window.addEventListener('scroll', ()=>{
    const h = document.getElementById('mainHeader');
    if(h) h.classList.toggle('scrolled', window.scrollY > 50);
  });
  document.addEventListener('click', (e)=>{
    if(!e.target.closest('.lang-switcher') && langOpen){
      langOpen = false;
      const dd = document.querySelector('.lang-dropdown');
      if(dd) dd.classList.remove('open');
    }
  });
}

function openMobile(){ document.getElementById('mobileNav').classList.add('open'); }
function closeMobile(){ document.getElementById('mobileNav').classList.remove('open'); }

function handleSubmit(e){
  e.preventDefault();
  const msg = document.getElementById('formMsg');
  if(msg){ msg.style.display='block'; msg.textContent = t('form_success'); }
  e.target.reset();
  setTimeout(()=>{ if(msg) msg.style.display='none'; },5000);
}

function initScrollReveal(){
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
  },{threshold:.1,rootMargin:'0px 0px -40px 0px'});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}

function getCeoImg(size){
  return `<img src="유니월드사진/사용할사진/대표님사진.png" alt="CEO 나정주" style="width:100%;height:100%;object-fit:cover;border-radius:50%;object-position:center 15%">`;
}

function initCeoPhotoClicks(){
  document.querySelectorAll('.ceo-img-upload').forEach(el=>{
    el.onclick = ()=>{
      const inp = document.createElement('input');
      inp.type='file';inp.accept='image/*';
      inp.onchange = (e)=>{
        const file = e.target.files[0];
        if(!file)return;
        const reader = new FileReader();
        reader.onload = (ev)=>{
          ceoPhotoData = ev.target.result;
          try{localStorage.setItem('uw_ceo_photo',ceoPhotoData);}catch(e){}
          render();
        };
        reader.readAsDataURL(file);
      };
      inp.click();
    };
  });
}

// Override render to include ceo photo init
const _origRender = render;
render = function(){
  _origRender();
  initCeoPhotoClicks();
  initHeroLogoClicks();
};

// ── BOOT ──
currentPage = parseHash();
render();
